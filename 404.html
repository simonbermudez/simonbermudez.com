<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Simon Bermudez</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to Simon Bermudez's WebGL portfolio.">
  <link rel="canonical" href="https://simonbermudez.com/">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Helvetica', 'Arial', sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .error-container {
      max-width: 600px;
      padding: 40px 20px;
    }
    h1 {
      font-size: 6em;
      margin: 0 0 20px 0;
      font-weight: 100;
      color: #2d89ef;
    }
    h2 {
      font-size: 2em;
      margin: 0 0 20px 0;
      font-weight: 300;
    }
    p {
      font-size: 1.2em;
      line-height: 1.6;
      margin: 0 0 30px 0;
      opacity: 0.8;
    }
    .btn {
      display: inline-block;
      padding: 15px 30px;
      background: #2d89ef;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s ease;
    }
    .btn:hover {
      background: #1f6cb8;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for seems to have vanished into the digital void.</p>
    <p>Let's get you back to the experience.</p>
    <a href="/" class="btn">Return to Portfolio</a>
  </div>
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Page Not Found - Simon Bermudez",
    "description": "404 error page for Simon Bermudez's WebGL portfolio",
    "url": "https://simonbermudez.com/404",
    "mainEntity": {
      "@type": "Person",
      "name": "Simon Bermudez",
      "url": "https://simonbermudez.com"
    }
  }
  </script>
</body>
</html>
